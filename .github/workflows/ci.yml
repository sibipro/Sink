name: CI

on:
  pull_request:
  push:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read Node version
        id: node
        run: echo "version=$(cat .node-version)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.node.outputs.version }}

      - name: Enable corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Boots the server and asserts it actually serves requests. A green
      # Cloudflare Pages build is not enough: PR #19 built fine and still took
      # production down at runtime.
      - name: Run tests
        run: pnpm test
